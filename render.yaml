# Render 블루프린트 — re-animator 입력단 워커(백그라운드 워커).
# Render 대시보드 New → Blueprint 로 이 리포를 고르면 아래 서비스가 자동 구성된다.
# 무거운 픽셀 연산(컷 분할·추출)을 Vercel 서버리스 밖 상시 서버에서 처리.
services:
  - type: worker # HTTP 포트 없는 백그라운드 워커(큐 폴링 루프)
    name: re-animator-worker
    runtime: node # Dockerfile 대신 Node 런타임(sharp prebuilt 로 빌드 빠름)
    rootDir: worker # worker/package.json 기준으로 설치·실행
    plan: starter # 백그라운드 워커는 유료(무료 티어 없음). ~$7/mo.
    region: singapore # 한국에서 가장 가까운 Render 리전
    buildCommand: npm install
    startCommand: node index.mjs
    autoDeploy: true # main 에 push 하면 자동 재배포
    envVars:
      # Vercel 프로젝트에 넣은 것과 "같은 값"을 Render 대시보드에서 입력.
      # sync:false = 블루프린트에 값 안 박고, 대시보드에서 수동 입력(시크릿).
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: BLOB_READ_WRITE_TOKEN
        sync: false
      # VLM 장면 그룹핑용(없으면 알고리즘 분할만, 폴백). OPENAI_VLM_MODEL 은 선택(기본 gpt-4o-mini).
      - key: OPENAI_API_KEY
        sync: false
      # M4 영상(Grok I2V — 폴백/옵션)
      - key: XAI_API_KEY
        sync: false
      # M4 영상(Kling I2V — 기본 엔진, 첫+끝 프레임 보간). 콘솔에서 발급한 단일 API Key(Bearer).
      - key: KLING_API_KEY
        sync: false
      # (레거시 옵션) 구형 Open Platform AK/SK→JWT. 신형은 KLING_API_KEY 만 있으면 됨.
      - key: KLING_ACCESS_KEY
        sync: false
      - key: KLING_SECRET_KEY
        sync: false
      # M6 더빙 TTS — 대사·내레이션 음성 생성. 둘 중 쓰는 provider 키만 있어도 됨.
      - key: TYPECAST_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
